<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surf My Cycle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f0f2;color:#333;min-height:100vh}
:root{--accent:#e84a6a;--accent-light:#fce4ea;--bg:#f8f0f2;--surface:#fff;--border:#e8d5da;--text:#2d1f24;--muted:#9a7a82;--radius:12px;--shadow:0 2px 12px rgba(232,74,106,.1)}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;box-shadow:var(--shadow)}
header h1{font-size:18px;font-weight:700;color:var(--accent)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:.2s;border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){background:var(--accent-light);color:var(--accent)}
.page{display:none;height:calc(100vh - 56px)}
.page.active{display:flex}
#page-record{flex-direction:row}
.cal-panel{width:58%;padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 4px}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;color:var(--accent)}
.cal-nav h3{font-size:16px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-head{text-align:center;font-size:12px;font-weight:600;color:var(--muted);padding:4px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;background:var(--surface);border:2px solid transparent;position:relative;transition:.15s;min-height:40px}
.cal-day:hover{border-color:var(--accent);background:var(--accent-light)}
.cal-day.other-month{opacity:.3}
.cal-day.today{border-color:var(--accent);font-weight:700}
.cal-day.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.cal-day.selected:hover{background:var(--accent)}
.cal-day.has-data::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);position:absolute;bottom:4px}
.cal-day.selected.has-data::after{background:#fff}
.time-tabs{display:flex;gap:4px;margin-bottom:12px}
.time-tab{padding:6px 12px;border-radius:8px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--muted);transition:.15s}
.time-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.time-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:4px;right:4px}
.time-dot.morning{background:#3498db}
.time-dot.afternoon{background:#f39c12}
.time-dot.evening{background:#9b59b6}
.time-emoji{font-size:12px;margin:0 1px}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.rec-panel{width:42%;background:var(--surface);border-left:1px solid var(--border);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.rec-date-info{background:var(--accent-light);border-radius:var(--radius);padding:14px}
.rec-date-info h2{font-size:18px;font-weight:700;color:var(--accent)}
.rec-date-info .phase-tag{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
.rec-date-info .tip{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.5}
.card{background:var(--bg);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:14px;resize:none;font-family:inherit;background:var(--surface)}
textarea:focus{outline:none;border-color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-row label{width:40px;font-size:13px;color:var(--text)}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row span{width:24px;text-align:right;font-size:13px;font-weight:600;color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:var(--surface);transition:.15s;position:relative}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.custom-chip{padding-right:22px;background:var(--accent-light);color:var(--accent)}
.chip .del-chip{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%;font-size:11px;opacity:0;transition:.2s;cursor:pointer}
.chip.custom-chip:hover .del-chip{opacity:1;background:rgba(232,74,106,0.2)}
select{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);font-family:inherit}
select:focus{outline:none;border-color:var(--accent)}
.save-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.save-btn:hover{opacity:.9}
.save-btn:active{transform:scale(.98)}
.save-btn.saved{background:#c73e5a}
.ai-chat{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.ai-chat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ai-chat-header h4{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.ai-chat-messages{max-height:200px;overflow-y:auto;margin-bottom:10px}
.ai-msg{background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.5}
.ai-msg.ai{background:#e8e0e5;border-radius:12px 12px 12px 4px}
.ai-msg.user{background:var(--accent-light);border-radius:12px 12px 4px 12px}
.ai-thinking{margin-bottom:8px}
.ai-thinking summary{cursor:pointer;color:var(--muted);font-size:12px;padding:4px 8px;background:#f5f5f5;border-radius:8px}
.ai-thinking .thinking-content{font-size:12px;color:#666;padding:8px;margin-top:4px;background:#fafafa;border-radius:8px;font-style:italic}
.ai-input-row{display:flex;gap:8px}
.ai-input-row input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit}
.ai-input-row input:focus{outline:none;border-color:var(--accent)}
.ai-input-row button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:12px;cursor:pointer}
.ai-input-row button:disabled{opacity:.6}
.ai-analysis{background:var(--accent-light);border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px}
.ai-analysis-title{font-weight:600;color:var(--accent);margin-bottom:6px}
.ai-analysis-scores{display:flex;flex-wrap:wrap;gap:8px}
.ai-score-tag{background:var(--surface);padding:4px 10px;border-radius:12px;font-size:11px}
.empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
#page-calendar{flex-direction:row}
#page-calendar .cal-panel{width:60%}
.detail-panel{width:40%;background:var(--surface);border-left:1px solid var(--border);padding:20px;overflow-y:auto}
.detail-panel h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.detail-empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-row .label{color:var(--muted)}
.detail-row .value{font-weight:600;color:var(--text)}
#page-analysis{flex-direction:column;padding:16px;overflow-y:auto;gap:12px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.chart-card{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:10px}
canvas{width:100%!important}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--surface);border-radius:16px;padding:24px;width:340px;max-width:90vw}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:16px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.form-row input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.form-row input:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-cancel{background:var(--bg);color:var(--muted)}
.btn-save{background:var(--accent);color:#fff}
@media(max-width:700px){
  #page-record,#page-calendar{flex-direction:column}
  .cal-panel,.rec-panel,.detail-panel{width:100%;height:auto}
  .rec-panel,.detail-panel{border-left:none;border-top:1px solid var(--border)}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <h1>Surf My Cycle</h1>
  <div class="tabs">
    <button class="tab active" onclick="showPage('record',this)">记录</button>
    <button class="tab" onclick="showPage('analysis',this)">分析</button>
  </div>
  <button class="tab" onclick="openSettings()" style="margin-left:8px">设置</button>
</header>

<div id="page-record" class="page active">
  <div class="cal-panel">
    <div class="cal-nav">
      <button onclick="prevMonth('r')">上月</button>
      <h3 id="r-month-title"></h3>
      <button onclick="nextMonth('r')">下月</button>
    </div>
    <div class="cal-grid" id="r-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>月经期</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div>卵泡期</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e91e63"></div>排卵期</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div>黄体期</div>
    </div>
  </div>
  <div class="rec-panel" id="rec-panel">
    <div class="rec-date-info" id="rec-header"><div class="empty-state">点击日历中的日期开始记录</div></div>
    <div id="rec-form" style="display:none;flex-direction:column;gap:14px">
      <div class="time-tabs">
        <div class="time-tab active" data-time="morning" onclick="selectTimeSlot(this)">🌅 早上</div>
        <div class="time-tab" data-time="afternoon" onclick="selectTimeSlot(this)">☀️ 下午</div>
        <div class="time-tab" data-time="evening" onclick="selectTimeSlot(this)">🌙 晚上</div>
      </div>
      <div class="card">
        <div class="card-title">此刻感受</div>
        <textarea id="rec-note" rows="2" placeholder="记录这个时段的感受..."></textarea>
      </div>
      <div class="ai-chat" id="ai-chat">
        <div class="ai-chat-header">
          <h4>💬 和AI聊聊</h4>
        </div>
        <div class="ai-chat-messages" id="ai-messages"></div>
        <div class="ai-input-row">
          <input type="text" id="ai-input" placeholder="告诉AI你的感受..." onkeypress="if(event.key==='Enter')sendAI()">
          <button onclick="sendAI()" id="ai-send-btn">发送</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">状态评分</div>
        <div class="slider-row"><label>心情</label><input type="range" id="s-mood" min="1" max="10" value="5" oninput="document.getElementById('v-mood').textContent=this.value"><span id="v-mood">5</span></div>
        <div class="slider-row"><label>能量</label><input type="range" id="s-energy" min="1" max="10" value="5" oninput="document.getElementById('v-energy').textContent=this.value"><span id="v-energy">5</span></div>
        <div class="slider-row"><label>效率</label><input type="range" id="s-focus" min="1" max="10" value="5" oninput="document.getElementById('v-focus').textContent=this.value"><span id="v-focus">5</span></div>
        <div class="slider-row"><label>社交</label><input type="range" id="s-social" min="1" max="10" value="5" oninput="document.getElementById('v-social').textContent=this.value"><span id="v-social">5</span></div>
        <div class="slider-row"><label>食欲</label><input type="range" id="s-appetite" min="1" max="10" value="5" oninput="document.getElementById('v-appetite').textContent=this.value"><span id="v-appetite">5</span></div>
      </div>
      <div class="card">
        <div class="card-title">全天生理状态</div>
        <select id="rec-period">
          <option value="">无月经</option>
          <option value="light">月经轻量</option>
          <option value="medium">月经中量</option>
          <option value="heavy">月经大量</option>
          <option value="spotting">点滴出血</option>
        </select>
      </div>
      <div class="card">
        <div class="card-title">全天标签</div>
        <div class="chips" id="custom-chips">
          <div class="chip" onclick="toggleChip(this)">甜食</div>
          <div class="chip" onclick="toggleChip(this)">咸味</div>
          <div class="chip" onclick="toggleChip(this)">碳水</div>
          <div class="chip" onclick="toggleChip(this)">蛋白质</div>
          <div class="chip" onclick="toggleChip(this)">辛辣</div>
          <div class="chip" onclick="toggleChip(this)">冷饮</div>
          <div class="chip" onclick="toggleChip(this)">情绪化</div>
          <div class="chip" onclick="toggleChip(this)">专注</div>
          <div class="chip" onclick="toggleChip(this)">创意</div>
          <div class="chip" onclick="toggleChip(this)">理性</div>
          <div class="chip" onclick="toggleChip(this)">躁动</div>
          <div class="chip" onclick="toggleChip(this)">平静</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" id="new-chip-input" placeholder="输入新标签..." style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px" onkeypress="if(event.key==='Enter')addNewChip()">
          <button onclick="addNewChip()" style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">+ 添加</button>
        </div>
      </div>
      <button class="save-btn" onclick="saveRecord()">保存记录</button>
    </div>
  </div>
</div>

<div id="page-analysis" class="page">
  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="stat-days">0</div><div class="lbl">累计记录天数</div></div>
    <div class="stat-card"><div class="num" id="stat-mood">-</div><div class="lbl">平均心情</div></div>
    <div class="stat-card"><div class="num" id="stat-streak">0</div><div class="lbl">连续记录天数</div></div>
  </div>
  <div class="chart-card"><h3>最近30天 心情与能量趋势</h3><canvas id="trend-chart" height="200"></canvas></div>
  <div class="chart-card"><h3>各周期阶段平均评分</h3><canvas id="phase-chart" height="200"></canvas></div>
</div>

<div class="modal" id="settings-modal">
  <div class="modal-box">
    <h3>周期设置</h3>
    <div class="form-row"><label>上次月经开始日期</label><input type="date" id="cfg-last-period"></div>
    <div class="form-row"><label>周期长度（天）</label><input type="number" id="cfg-cycle-len" value="28" min="21" max="45"></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <h3>AI伴侣设置</h3>
    <div class="form-row"><label>AI模型</label><select id="cfg-model"><option value="MiniMax-M2.7">MiniMax-M2.7（最强）</option><option value="MiniMax-M2.7-highspeed">MiniMax-M2.7 快速版</option><option value="MiniMax-M2.5">MiniMax-M2.5（平衡）</option><option value="MiniMax-M2">MiniMax-M2（轻量）</option></select></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeSettings()">取消</button><button class="btn-save" onclick="saveSettings()">保存</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Supabase REST API 直连（无需CDN库）
const SUPABASE_URL = 'https://nslmawgeyaazawefajlq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zbG1hd2dleWFhemF3ZWZhamxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU0OTUsImV4cCI6MjA5MDMwMTQ5NX0.5ubSYgpX-bFxte7YYNGazjcbqNM2n67tTxrbGwcRjIc';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
async function sbGet(table, params, retries = 2) {
  const q = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + q, { headers: SB_HEADERS });
      if (r.ok) return r.json();
      if (i === retries) {
        console.error('sbGet failed after', retries, 'retries:', r.status);
        return [];
      }
    } catch (e) {
      if (i === retries) {
        console.error('sbGet error after retries:', e);
        return [];
      }
    }
    await new Promise(r => setTimeout(r, 500));
  }
  return [];
}
async function sbUpsert(table, body, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
        method: 'POST', headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation' },
        body: JSON.stringify(body)
      });
      if (r.ok) return true;
      const errorText = await r.text();
      console.error('sbUpsert error:', r.status, errorText);
      if (i === retries) {
        return false;
      }
    } catch (e) {
      console.error('sbUpsert exception:', e);
      if (i === retries) {
        return false;
      }
    }
    await new Promise(r => setTimeout(r, 500));
  }
  return false;
}
async function sbDelete(table, params) {
  const q = Object.entries(params).map(([k,v]) => k + '=eq.' + encodeURIComponent(v)).join('&');
  await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + q, { method: 'DELETE', headers: SB_HEADERS });
}

let currentUserId = 'default_user'; // 可以用localStorage存储用户ID

const TIME_SLOTS = {
  morning: { name: '早上', color: '#3498db' },
  afternoon: { name: '下午', color: '#f39c12' },
  evening: { name: '晚上', color: '#9b59b6' }
};

// 配置缓存（同步版本使用）
let configCache = null;

// 数据操作
async function getData() {
  // 尝试从Supabase读取
  const rows = await sbGet('records', { 'user_id': 'eq.' + currentUserId, 'select': '*' });
  if (Array.isArray(rows) && rows.length > 0) {
    return rows.sort((a, b) => new Date(a.date) - new Date(b.date));
  }
  // 降级到localStorage
  return getDataLegacy();
}
async function getRecord(dateStr) {
  // 尝试从Supabase读取
  const rows = await sbGet('records', { 'user_id': 'eq.' + currentUserId, 'date': 'eq.' + dateStr, 'select': '*' });
  if (rows && rows[0]) return rows[0];
  // 降级到localStorage
  return getRecordLegacy(dateStr);
}
async function setData(arr) {
  // 危险操作：批量替换，建议改用 saveRecordDB 单条保存
  console.warn('setData: 批量替换数据，可能导致数据丢失');
  await sbDelete('records', { user_id: currentUserId });
  for (const item of arr) {
    await sbUpsert('records', { ...item, user_id: currentUserId });
  }
}
async function getConfig() {
  const rows = await sbGet('config', { 'user_id': 'eq.' + currentUserId, 'select': '*' });
  return (rows && rows[0]) ? (rows[0].value || {}) : {};
}
async function setConfig(cfg) {
  // 先读取现有配置，合并后再保存
  const existing = await getConfig();
  const merged = { ...existing, ...cfg, updated_at: new Date().toISOString() };
  await sbUpsert('config', { user_id: currentUserId, value: merged });
}
async function getRecord(dateStr) {
  const rows = await sbGet('records', { 'user_id': 'eq.' + currentUserId, 'date': 'eq.' + dateStr, 'select': '*' });
  return (rows && rows[0]) ? rows[0] : null;
}
async function saveRecordDB(record) {
  // 先保存到本地备份
  localStorage.setItem('smc_record_' + record.date, JSON.stringify(record));
  
  // 尝试Supabase
  const result = await sbUpsert('records', { ...record, user_id: currentUserId });
  if (!result) {
    console.warn('Supabase保存失败，降级到localStorage');
    // 降级到localStorage
    const allData = getDataLegacy();
    const idx = allData.findIndex(d => d.date === record.date);
    if (idx >= 0) {
      allData[idx] = record;
    } else {
      allData.push(record);
    }
    localStorage.setItem('smc_data', JSON.stringify(allData));
    return 'local'; // 返回local表示使用了本地存储
  }
  return 'supabase';
}

// 从旧IndexedDB读取数据（迁移用）
function readFromIndexedDB() {
  return new Promise(resolve => {
    const result = { records: [], config: {} };
    try {
      const req = indexedDB.open('surf-my-cycle', 1);
      req.onerror = () => resolve(result);
      req.onupgradeneeded = () => resolve(result); // DB不存在
      req.onsuccess = e => {
        const db = e.target.result;
        const stores = Array.from(db.objectStoreNames);
        if (!stores.includes('records')) { db.close(); resolve(result); return; }
        const tx = db.transaction(['records', 'config'], 'readonly');
        const recReq = tx.objectStore('records').getAll();
        recReq.onsuccess = re => { result.records = re.target.result || []; };
        const cfgReq = tx.objectStore('config').get('settings');
        cfgReq.onsuccess = ce => { result.config = (ce.target.result && ce.target.result.value) || {}; };
        tx.oncomplete = () => { db.close(); resolve(result); };
        tx.onerror = () => { db.close(); resolve(result); };
      };
    } catch(e) { resolve(result); }
  });
}

async function getCycleDay(dateStr) {
  if (!configCache) configCache = await getConfig();
  const cfg = configCache;
  if (!cfg.lastPeriod) return null;
  const last = new Date(cfg.lastPeriod + 'T00:00:00');
  const target = new Date(dateStr + 'T00:00:00');
  const cycleLen = cfg.cycleLen || 28;
  let diff = Math.round((target - last) / 86400000);
  if (diff < 0) diff = ((diff % cycleLen) + cycleLen) % cycleLen;
  return (diff % cycleLen) + 1;
}

function getPhase(day) {
  if (!day) return null;
  if (day >= 1 && day <= 5) return { name:'月经期', color:'#e74c3c', tip:'雌孕激素低谷，建议休息' };
  if (day >= 6 && day <= 13) return { name:'卵泡期', color:'#f39c12', tip:'雌激素上升，精力逐渐恢复' };
  if (day >= 14 && day <= 16) return { name:'排卵期', color:'#e91e63', tip:'雌激素高峰，社交欲强' };
  if (day >= 17 && day <= 28) return { name:'黄体期', color:'#9b59b6', tip:'孕激素升高，适合细致工作' };
  return null;
}

async function renderCalendar(gridId, titleId, state, onClickDay) {
  const grid = document.getElementById(gridId);
  const title = document.getElementById(titleId);
  if (!grid || !title) return;

  const { year, month } = state;
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  title.textContent = year + '年 ' + monthNames[month];

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const data = await getData();

  let html = '';
  ['日','一','二','三','四','五','六'].forEach(d => { html += '<div class="cal-head">' + d + '</div>'; });

  const prevDays = new Date(year, month, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    html += '<div class="cal-day other-month"><span>' + (prevDays - i) + '</span></div>';
  }

  const phaseNames = ['月经期','卵泡期','排卵期','黄体期'];
  const phaseColors = ['#e74c3c','#f39c12','#e91e63','#9b59b6'];
  
  // 预先获取配置以避免循环中多次调用
  let cfg = configCache;
  if (!cfg) {
    cfg = await getConfig();
    configCache = cfg;
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const rec = data.find(r => r.date === ds);
    
    // 同步计算cycleDay
    let cycleDay = null;
    if (cfg.lastPeriod) {
      const last = new Date(cfg.lastPeriod + 'T00:00:00');
      const target = new Date(ds + 'T00:00:00');
      const cycleLen = cfg.cycleLen || 28;
      let diff = Math.round((target - last) / 86400000);
      if (diff < 0) diff = ((diff % cycleLen) + cycleLen) % cycleLen;
      cycleDay = (diff % cycleLen) + 1;
    }
    
    const phase = getPhase(cycleDay);

    let cls = 'cal-day';
    if (ds === today) cls += ' today';
    if (rec && rec.slots && Object.keys(rec.slots).length > 0) cls += ' has-data';
    if (state.selected === ds) cls += ' selected';

    let dots = '';
    if (rec && rec.slots) {
      Object.keys(rec.slots).forEach(slot => {
        if (rec.slots[slot] && rec.slots[slot].mood) {
          const emoji = slot === 'morning' ? '🌅' : slot === 'afternoon' ? '☀️' : slot === 'evening' ? '🌙' : '●';
          dots += '<span class="time-emoji">' + emoji + '</span>';
        }
      });
    }
    const phaseDot = phase && !dots ? '<div class="phase-dot" style="background:' + phase.color + '"></div>' : '';
    html += '<div class="' + cls + '" data-date="' + ds + '">' + (dots || phaseDot) + '<span>' + d + '</span></div>';
  }

  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    html += '<div class="cal-day other-month"><span>' + d + '</span></div>';
  }

  grid.innerHTML = html;

  grid.querySelectorAll('.cal-day[data-date]').forEach(el => {
    el.addEventListener('click', () => {
      const ds = el.getAttribute('data-date');
      state.selected = ds;
      renderCalendar(gridId, titleId, state, onClickDay);
      onClickDay(ds);
    });
  });
}

      e.stopPropagation();
      if (confirm('删除标签 "' + text + '"？')) {

  });

    alert('标签已存在');
    return;
  }
  
  // 添加到自定义标签
  customChips.push(text);

  saveCustomChips();
  renderCustomChips();
}

        reply = content.replace(/<think>[\s\S]*?(?:\n\n\n|<\/think>)/, '').trim();
      } else {
        reply = content;
      }
    }
    
    const scoreMatch = reply.match(/\[评分\]心情:(\d+),能量:(\d+),效率:(\d+),社交:(\d+),食欲:(\d+)/);
    let scores = null;
    if (scoreMatch) {
      scores = {
        mood: scoreMatch[1],
        energy: scoreMatch[2],
        focus: scoreMatch[3],
        social: scoreMatch[4],
        appetite: scoreMatch[5]
      };
      reply = reply.replace(scoreMatch[0], '').trim();
    }
    
    // 分别显示思考过程和回复
    let html = '';
    if (thinking) {
      html += '<div class="ai-thinking"><details><summary>💭 思考过程</summary><div class="thinking-content">' + thinking.replace(/\n/g, '<br>') + '</div></details></div>';
    }
    html += '<div class="ai-msg ai">' + reply.replace(/\n/g, '<br>') + '</div>';
    messagesEl.innerHTML += html;
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    aiConversation.push({ role: 'user', content: msg });
    aiConversation.push({ role: 'assistant', content: reply });
    
    // 保存对话历史到IndexedDB
    await saveAIConversation(currentRecDate, aiConversation);
    
    // 自动提取对话关键内容到此刻感受
    const noteInput = document.getElementById('rec-note');
    const currentNote = noteInput.value || '';
    // 提取用户消息和AI回复的关键部分（取前100字）
    const summary = '【AI对话摘要】' + msg.substring(0, 50) + ' → ' + reply.substring(0, 50);
    if (!currentNote.includes('【AI对话摘要】')) {
      noteInput.value = currentNote ? currentNote + '\n' + summary : summary;
    }
    
    if (scores) {
      const analysisEl = document.getElementById('ai-analysis');
      if (!analysisEl) {
        const newAnalysis = document.createElement('div');
        newAnalysis.id = 'ai-analysis';
        newAnalysis.className = 'ai-analysis';
        newAnalysis.innerHTML = '<div class="ai-analysis-title">✨ 已自动分析</div><div class="ai-analysis-scores"></div>';
        messagesEl.parentNode.insertBefore(newAnalysis, messagesEl.nextSibling);
      }
      const scoresEl = document.querySelector('.ai-analysis-scores');
      scoresEl.innerHTML = '<span class="ai-score-tag">心情 ' + scores.mood + '</span><span class="ai-score-tag">能量 ' + scores.energy + '</span><span class="ai-score-tag">效率 ' + scores.focus + '</span><span class="ai-score-tag">社交 ' + scores.social + '</span><span class="ai-score-tag">食欲 ' + scores.appetite + '</span>';
      
      ['mood','energy','focus','social','appetite'].forEach(k => {
        document.getElementById('s-' + k).value = scores[k];
        document.getElementById('v-' + k).textContent = scores[k];
      });
    }
    
    // AI对话结束后自动保存记录
    await saveRecord();
  } catch (e) {
    messagesEl.innerHTML += '<div class="ai-msg ai">抱歉，连接出错：' + e.message + '</div>';
  }
  
  btn.disabled = false;
  btn.textContent = '发送';
}

let trendChart = null, phaseChart = null;

async function renderAnalysis() {
  const data = (await getData()).sort((a,b) => a.date.localeCompare(b.date));
  let totalRecords = 0;
  let totalMood = 0;
  let totalEnergy = 0;
  let count = 0;
  
  data.forEach(d => {
    if (d.slots) {
      Object.values(d.slots).forEach(slot => {
        if (slot.mood) {
          totalMood += +slot.mood;
          totalEnergy += +slot.energy;
          count++;
        }
      });
    }
  });
  totalRecords = count;
  
  document.getElementById('stat-days').textContent = totalRecords;
  if (count > 0) {
    document.getElementById('stat-mood').textContent = (totalMood / count).toFixed(1);
  }
  
  let streak = 0;
  const today = new Date().toISOString().split('T')[0];
  let check = new Date(today + 'T00:00:00');
  while (true) {
    const ds = check.toISOString().split('T')[0];
    const rec = await getRecord(ds);
    if (!rec || !rec.slots || Object.keys(rec.slots).length === 0) break;
    streak++;
    check.setDate(check.getDate() - 1);
  }
  document.getElementById('stat-streak').textContent = streak;

  const last30 = data.slice(-30);
  const labels = [];
  const moods = [];
  const energies = [];
  
  last30.forEach(d => {
    if (d.slots) {
      let dayMood = 0, dayEnergy = 0, dayCount = 0;
      Object.values(d.slots).forEach(slot => {
        if (slot.mood) {
          dayMood += +slot.mood;
          dayEnergy += +slot.energy;
          dayCount++;
        }
      });
      if (dayCount > 0) {
        labels.push(d.date.slice(5));
        moods.push((dayMood / dayCount).toFixed(1));
        energies.push((dayEnergy / dayCount).toFixed(1));
      }
    }
  });

  if (trendChart) trendChart.destroy();
  if (labels.length > 0) {
    trendChart = new Chart(document.getElementById('trend-chart'), {
      type: 'line',
      data: { labels, datasets: [
        { label:'心情', data:moods, borderColor:'#e84a6a', backgroundColor:'rgba(232,74,106,.1)', tension:.4, fill:true },
        { label:'能量', data:energies, borderColor:'#f39c12', backgroundColor:'rgba(243,156,18,.1)', tension:.4, fill:true }
      ]},
      options: { plugins:{ legend:{ position:'top' } }, scales:{ y:{ min:1,max:10 } }, responsive:true }
    });
  }

  const phaseNames = ['月经期','卵泡期','排卵期','黄体期'];
  const phaseColors = ['#e74c3c','#f39c12','#e91e63','#9b59b6'];
  
  // 先计算所有日期的cycleDay
  const cycleDays = {};
  for (const d of data) {
    cycleDays[d.date] = await getCycleDay(d.date);
  }
  
  const phaseData = phaseNames.map(pn => {
    let total = 0, cnt = 0;
    data.forEach(d => {
      const cd = cycleDays[d.date];
      const ph = getPhase(cd);
      if (ph && ph.name === pn && d.slots) {
        Object.values(d.slots).forEach(slot => {
          if (slot.mood) {
            total += +slot.mood;
            cnt++;
          }
        });
      }
    });
    return cnt ? (total / cnt).toFixed(1) : 0;
  });

  if (phaseChart) phaseChart.destroy();
  phaseChart = new Chart(document.getElementById('phase-chart'), {
    type: 'bar',
    data: { labels: phaseNames, datasets: [{ label:'平均心情', data:phaseData, backgroundColor:phaseColors }] },
    options: { plugins:{ legend:{ display:false } }, scales:{ y:{ min:0,max:10 } }, responsive:true }
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'analysis') renderAnalysis();
}

async function openSettings() {
  const cfg = await getConfig();
  document.getElementById('cfg-last-period').value = cfg.lastPeriod || '';
  document.getElementById('cfg-cycle-len').value = cfg.cycleLen || 28;
  document.getElementById('cfg-model').value = cfg.model || 'MiniMax-M2.7';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
async function saveSettings() {
  await setConfig({ 
    lastPeriod: document.getElementById('cfg-last-period').value, 
    cycleLen: parseInt(document.getElementById('cfg-cycle-len').value) || 28,
    model: document.getElementById('cfg-model').value
  });
  configCache = null; // 清除配置缓存
  closeSettings();
  renderCalendar('r-grid','r-month-title', rState, loadRecordPanel);
}

document.addEventListener('DOMContentLoaded', async function() {
  try {
    // 从IndexedDB迁移旧数据到Supabase（仅一次，且Supabase无数据时才迁移）
    const migrated = localStorage.getItem('smc_migrated_supabase_v2');
    if (!migrated) {
      console.log('检查是否需要迁移旧数据...');
      
      // 先检查 Supabase 是否已有数据
      const existingRecords = await sbGet('records', { 'user_id': 'eq.' + currentUserId, 'select': '*', 'limit': 1 });
      const hasExistingData = Array.isArray(existingRecords) && existingRecords.length > 0;
      
      if (hasExistingData) {
        console.log('Supabase 已有数据，跳过迁移');
      } else {
        console.log('Supabase 无数据，开始迁移...');
        // 先尝试从IndexedDB读取
        const idbData = await readFromIndexedDB();
        if (idbData.records.length > 0 || Object.keys(idbData.config).length > 0) {
          console.log('从IndexedDB迁移', idbData.records.length, '条记录');
          if (idbData.records.length > 0) await setData(idbData.records);
          if (Object.keys(idbData.config).length > 0) await setConfig(idbData.config);
        } else {
          // 从localStorage迁移
          const oldData = getDataLegacy();
          const oldConfig = getConfigLegacy();
          if (oldData.length > 0) await setData(oldData);
          if (Object.keys(oldConfig).length > 0) await setConfig(oldConfig);
        }
      }
      localStorage.setItem('smc_migrated_supabase_v2', '1');
      console.log('迁移标记已设置');
    }
    
    console.log('loading config...');
    // 预加载配置缓存
    configCache = await getConfig();
    console.log('config loaded:', JSON.stringify(configCache));
    
    // 加载自定义标签
    loadCustomChips();
    renderCustomChips();
    
    // 每次打开都重置到当前月份和今天
    rState.year = new Date().getFullYear();
    rState.month = new Date().getMonth();
    rState.selected = new Date().toISOString().split('T')[0];
    
    console.log('calling renderCalendar...');
    await renderCalendar('r-grid','r-month-title', rState, loadRecordPanel);
    console.log('renderCalendar done');
    await loadRecordPanel(rState.selected);
    console.log('loadRecordPanel done');
  } catch(e) {
    console.error('DOMContentLoaded ERROR:', e);
    document.getElementById('r-month-title').textContent = '加载失败: ' + e.message;
  }
});
</script>
